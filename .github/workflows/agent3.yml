name: Agent 3 - BRVM Rapports

on:
  schedule:
    - cron: '0 8 * * *'   # collect batch 1
    - cron: '0 10 * * *'  # collect batch 2
    - cron: '0 12 * * *'  # collect batch 3
    - cron: '0 14 * * *'  # collect batch 4
    - cron: '0 16 * * *'  # collect batch 5
    - cron: '0 20 * * *'  # rapport journalier
    - cron: '0 7 * * 1'   # rapport hebdo
    - cron: '0 7 1 * *'   # rapport mensuel
  workflow_dispatch:
    inputs:
      batch:
        description: 'Numéro du batch (1-5, ou 0 pour tous)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '0'

permissions:
  contents: write

jobs:
  collect:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 8 * * *' ||
      github.event.schedule == '0 10 * * *' ||
      github.event.schedule == '0 12 * * *' ||
      github.event.schedule == '0 14 * * *' ||
      github.event.schedule == '0 16 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 "anthropic==0.49.0" "supabase==2.10.0" python-dotenv google-auth google-auth-oauthlib google-api-python-client "httpx==0.27.0" "httpcore==1.0.9" "websockets>=13.0"
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "REPORT_EMAIL_FROM=${{ secrets.REPORT_EMAIL_FROM }}" >> .env
          echo "REPORT_EMAIL_TO=${{ secrets.REPORT_EMAIL_TO }}" >> .env
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> .env
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> .env
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
      - name: Create token.json
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json
      - name: Determine batch number
        id: batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "num=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            echo "num=1" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "num=2" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "num=3" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "num=4" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "num=5" >> $GITHUB_OUTPUT
          else
            echo "num=1" >> $GITHUB_OUTPUT
          fi
      - name: Run collect
        run: python main.py collect --batch=${{ steps.batch.outputs.num }}
      - name: Heartbeat commit (keep repo active)
        run: |
          date -u +"Dernière exécution : %Y-%m-%d %H:%M:%S UTC" > last_run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git diff --quiet --cached || git commit -m "chore: heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  rapport-jour:
    if: github.event.schedule == '0 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 "anthropic==0.49.0" "supabase==2.10.0" python-dotenv google-auth google-auth-oauthlib google-api-python-client "httpx==0.27.0" "httpcore==1.0.9" "websockets>=13.0"
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "REPORT_EMAIL_FROM=${{ secrets.REPORT_EMAIL_FROM }}" >> .env
          echo "REPORT_EMAIL_TO=${{ secrets.REPORT_EMAIL_TO }}" >> .env
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> .env
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> .env
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
      - name: Create token.json
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json
      - name: Run rapport journalier
        run: python main.py rapport-jour

  rapport-hebdo:
    if: github.event.schedule == '0 7 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 "anthropic==0.49.0" "supabase==2.10.0" python-dotenv google-auth google-auth-oauthlib google-api-python-client "httpx==0.27.0" "httpcore==1.0.9" "websockets>=13.0"
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "REPORT_EMAIL_FROM=${{ secrets.REPORT_EMAIL_FROM }}" >> .env
          echo "REPORT_EMAIL_TO=${{ secrets.REPORT_EMAIL_TO }}" >> .env
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> .env
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> .env
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
      - name: Create token.json
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json
      - name: Run rapport hebdo
        run: python main.py rapport-hebdo

  rapport-mensuel:
    if: github.event.schedule == '0 7 1 * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 "anthropic==0.49.0" "supabase==2.10.0" python-dotenv google-auth google-auth-oauthlib google-api-python-client "httpx==0.27.0" "httpcore==1.0.9" "websockets>=13.0"
      - name: Create .env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "REPORT_EMAIL_FROM=${{ secrets.REPORT_EMAIL_FROM }}" >> .env
          echo "REPORT_EMAIL_TO=${{ secrets.REPORT_EMAIL_TO }}" >> .env
          echo "GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}" >> .env
          echo "GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}" >> .env
          echo "GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }}" >> .env
          echo "SMTP_SERVER=${{ secrets.SMTP_SERVER }}" >> .env
          echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
          echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
      - name: Create token.json
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json
      - name: Run rapport mensuel
        run: python main.py rapport-mensuel
